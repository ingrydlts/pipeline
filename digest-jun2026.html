<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Por Dentro · Digest Inteligente · Jun 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:       #FAF8F4;
      --text:     #2A1F18;
      --muted:    #7A6B60;
      --surface:  #FFFFFF;
      --border:   #E4DDD4;
      --hover-bg: #F3EEE8;

      /* Paleta de marca */
      --merlot:   #501318;
      --esmeralda:#063B35;
      --moss:     #577328;
      --placid:   #8FA5B8;
      --dbrown:   #3D2B1F;
      --ouro:     #BB9351;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ══ HEADER ══════════════════════════════════════ */
    .hdr {
      background: var(--text);
      color: var(--bg);
      padding: 26px 52px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .hdr-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 300;
      letter-spacing: -0.4px;
      line-height: 1;
    }
    .hdr-title em { font-style: italic; color: var(--ouro); }
    .hdr-sub {
      font-size: 10.5px;
      opacity: 0.45;
      margin-top: 5px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }
    .hdr-right { font-size: 10.5px; opacity: 0.4; text-align: right; line-height: 1.7; }

    /* ══ TABS ════════════════════════════════════════ */
    .tabs {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      overflow-x: auto;
      padding: 0 52px;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      padding: 14px 18px;
      border: none;
      background: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--muted);
      border-bottom: 2.5px solid transparent;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color .18s;
    }
    .tab:hover { color: var(--text); }

    .tab.active[data-c="juridica"]     { color: var(--merlot);   border-bottom-color: var(--merlot);   font-weight:600; }
    .tab.active[data-c="burocratica"]  { color: var(--esmeralda);border-bottom-color: var(--esmeralda);font-weight:600; }
    .tab.active[data-c="academica"]    { color: var(--moss);     border-bottom-color: var(--moss);     font-weight:600; }
    .tab.active[data-c="civica"]       { color: #5B7A93;         border-bottom-color: var(--placid);   font-weight:600; }
    .tab.active[data-c="financas"]     { color: var(--dbrown);   border-bottom-color: var(--dbrown);   font-weight:600; }
    .tab.active[data-c="trendmapping"] { color: #8B6B2E;         border-bottom-color: var(--ouro);     font-weight:600; }
    .tab.active[data-c="mesa"]         { color: var(--text);     border-bottom-color: var(--text);     font-weight:600; }

    .tbadge {
      background: var(--border);
      color: var(--muted);
      border-radius: 20px;
      padding: 1px 7px;
      font-size: 10px;
      font-weight: 700;
    }

    /* ══ MAIN ════════════════════════════════════════ */
    .main { max-width: 1100px; margin: 0 auto; padding: 44px 52px; }

    .section { display: none; }
    .section.active { display: block; }

    /* Category header */
    .cat-hdr { margin-bottom: 30px; }
    .cat-hdr h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px;
      font-weight: 300;
      line-height: 1.05;
      margin-bottom: 8px;
    }
    .cat-hdr .cdesc {
      font-size: 13.5px;
      color: var(--muted);
      max-width: 640px;
      line-height: 1.55;
      margin-bottom: 14px;
    }
    .sources-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .sources-label {
      font-size: 9.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .09em;
      color: var(--muted);
      opacity: .7;
    }
    .schip {
      background: var(--hover-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 9px;
      font-size: 10.5px;
    }
    .schip a { color: var(--muted); text-decoration: none; }
    .schip a:hover { color: var(--text); text-decoration: underline; }

    /* ══ NEWS CARDS (details/summary) ════════════════ */
    .news-stack { display: flex; flex-direction: column; gap: 10px; }

    details.nc {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left-width: 3px;
      border-left-color: var(--cc);        /* set inline */
      border-radius: 10px;
      overflow: hidden;
      transition: box-shadow .2s;
    }
    details.nc:hover  { box-shadow: 0 3px 16px rgba(42,31,24,.06); }
    details.nc[open]  { box-shadow: 0 5px 26px rgba(42,31,24,.1); }

    summary.ncs {
      list-style: none;
      cursor: pointer;
      padding: 18px 22px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      user-select: none;
    }
    summary.ncs::-webkit-details-marker { display: none; }

    .ncs-left { flex: 1; }
    .ncs-left h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 21px;
      font-weight: 400;
      line-height: 1.25;
      color: var(--text);
      margin-bottom: 11px;
    }

    .ntags { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }

    .tag-fmt {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10.5px;
      font-weight: 600;
      color: #fff;
      background: var(--cc);
    }
    .tag-p {
      background: var(--hover-bg);
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
    }
    .tag-u {
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 9.5px;
      font-weight: 800;
      letter-spacing: .07em;
      text-transform: uppercase;
    }
    .u-alta   { background:#FCEAE6; color:#7D2310; }
    .u-media  { background:#FEF3E2; color:#6B4008; }
    .u-baixa  { background:#EBF0E5; color:#2A5520; }
    .tag-kpi {
      background: #EEEAFF;
      color: #3D1F9B;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
    }

    .nc-chevron {
      font-size: 14px;
      color: var(--muted);
      flex-shrink: 0;
      margin-top: 5px;
      transition: transform .2s;
    }
    details.nc[open] .nc-chevron { transform: rotate(180deg); }

    /* Card body */
    .ncb {
      padding: 0 22px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .ncb-desc {
      padding-top: 16px;
      font-size: 14px;
      line-height: 1.72;
      color: var(--text);
    }
    .ncb-fmt {
      background: rgba(0,0,0,.02);
      border-left: 2.5px solid var(--cc);
      padding: 12px 14px;
      border-radius: 0 7px 7px 0;
    }
    .ncb-fmt-label {
      font-size: 9.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .09em;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .ncb-fmt p { font-size: 13px; line-height: 1.57; color: var(--text); }

    .ncb-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .nc-fonte {
      font-size: 11.5px;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .nc-fonte:hover { color: var(--text); text-decoration: underline; }

    .btn-mesa {
      background: var(--text);
      color: var(--bg);
      border: none;
      padding: 9px 16px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: opacity .18s;
    }
    .btn-mesa:hover { opacity: .78; }
    .btn-mesa.added {
      background: #EBF0E5;
      color: #2A5520;
      cursor: default;
    }

    /* ══ MESA DE ROTEIRIZAÇÃO ════════════════════════ */
    .mesa-hdr {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 14px;
    }
    .mesa-hdr h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px;
      font-weight: 300;
    }
    .mesa-hdr-sub { font-size: 13.5px; color: var(--muted); margin-top: 5px; }
    .mesa-acts { display: flex; gap: 9px; align-items: center; }

    .btn-export {
      background: var(--text);
      color: var(--bg);
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: opacity .18s;
    }
    .btn-export:hover { opacity: .78; }
    .btn-export:disabled { opacity: .4; cursor: default; }

    .btn-clear {
      background: none;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all .15s;
    }
    .btn-clear:hover { color: var(--text); border-color: var(--muted); }

    .mesa-empty {
      text-align: center;
      padding: 72px 32px;
      color: var(--muted);
      border: 2px dashed var(--border);
      border-radius: 14px;
    }
    .mesa-empty-icon { font-size: 38px; opacity: .35; margin-bottom: 16px; }
    .mesa-empty p { font-size: 14px; line-height: 1.65; }
    .mesa-empty strong { color: var(--text); }

    .mesa-list { display: flex; flex-direction: column; gap: 20px; }

    .mcard {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .mcard-hdr {
      padding: 16px 20px;
      background: var(--hover-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .mcard-hdr-left { flex: 1; }
    .mcard-hdr h4 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 19px;
      font-weight: 400;
      line-height: 1.25;
    }
    .mcard-cat {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-top: 4px;
      opacity: .65;
    }
    .btn-remove {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 15px;
      padding: 4px 8px;
      border-radius: 5px;
      flex-shrink: 0;
      transition: all .15s;
    }
    .btn-remove:hover { background: #FCEAE6; color: #7D2310; }

    .mcard-body { padding: 16px 20px; }
    .mcard-body label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .09em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .mesa-ta {
      width: 100%;
      min-height: 110px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      line-height: 1.65;
      color: var(--text);
      background: var(--bg);
      resize: none;
      overflow: hidden;
      transition: border-color .15s;
    }
    .mesa-ta:focus { outline: none; border-color: var(--muted); }
    .mesa-ta::placeholder { color: #C0B0A0; }

    .save-dot {
      font-size: 11px;
      color: #2A5520;
      margin-top: 6px;
      opacity: 0;
      transition: opacity .3s;
    }
    .save-dot.show { opacity: 1; }

    /* ══ FORMATO SELECT ══════════════════════════════ */
    .fmt-select-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .fmt-select-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      white-space: nowrap;
    }
    .fmt-select {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px 6px 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: var(--text);
      background: var(--bg);
      cursor: pointer;
      min-width: 158px;
      transition: border-color .15s;
    }
    .fmt-select:focus { outline: none; border-color: var(--ouro); }
    .fmt-select:hover { border-color: var(--muted); }

    /* ══ BOTÃO PROMPT À CLAUDE ════════════════════════ */
    .btn-prompt-claude {
      background: var(--ouro);
      color: var(--bg);
      border: none;
      padding: 7px 14px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: opacity .18s, background .25s, color .25s;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .btn-prompt-claude:hover { opacity: .82; }

    .mcard-hdr-actions {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-shrink: 0;
    }

    /* ══ RESPONSIVE ══════════════════════════════════ */
    @media (max-width: 780px) {
      .hdr   { padding: 18px 20px; }
      .tabs  { padding: 0 12px; }
      .main  { padding: 28px 20px; }
      .fmt-select { min-width: 130px; }
    }
  </style>
</head>

let mesa = JSON.parse(localStorage.getItem('pd_mesa') || '[]');

function getNote(id)       { return localStorage.getItem('pd_note_' + id) || ''; }
function saveNote(id, val) { localStorage.setItem('pd_note_' + id, val); }

/* ════════════════════════════════════════════════
   RENDER TABS
════════════════════════════════════════════════ */
function buildTabs() {
  const nav = document.getElementById('tabs');
  const cats = Object.keys(CAT);
  nav.innerHTML = cats.map((c, i) => `
    <button class="tab ${i===0?'active':''}" data-c="${c}" onclick="showCat('${c}',this)">
      ${CAT[c].icon} ${CAT[c].label}
      <span class="tbadge">${CAT[c].count}</span>
    </button>
  `).join('') + `
    <button class="tab" data-c="mesa" onclick="showCat('mesa',this)">
      ✍️ Mesa
      <span class="tbadge" id="tb-mesa">${mesa.length}</span>
    </button>
  `;
}

/* ════════════════════════════════════════════════
   RENDER CAT SECTION
════════════════════════════════════════════════ */
function buildCatSection(cat) {
  const m = CAT[cat];
  const items = NEWS[cat] || [];

  const src = m.sources.map(([n,u]) =>
    `<span class="schip"><a href="${u}" target="_blank">↗ ${n}</a></span>`
  ).join('');

  const cards = items.map(item => buildCard(item, m)).join('');

  return `
    <div class="section" id="sec-${cat}">
      <div class="cat-hdr">
        <h2>${m.icon} ${m.label}</h2>
        <p class="cdesc">${m.desc}</p>
        <div class="sources-row">
          <span class="sources-label">Fontes:</span>${src}
        </div>
      </div>
      <div class="news-stack">${cards}</div>
    </div>
  `;
}

function buildCard(item, m) {
  const uLabel = {alta:'URGENTE',media:'RELEVANTE',baixa:'MONITOR'};
  const uCls   = {alta:'u-alta',media:'u-media',baixa:'u-baixa'};
  const ps = item.personas.map(p=>`<span class="tag-p">${p}</span>`).join('');
  const added = mesa.includes(item.id);

  return `
    <details class="nc" style="--cc:${m.color}" id="nc-${item.id}">
      <summary class="ncs">
        <div class="ncs-left">
          <h3>${item.title}</h3>
          <div class="ntags">
            <span class="tag-fmt" style="background:${m.color}">${item.format}</span>
            ${ps}
            <span class="tag-u ${uCls[item.urgency]}">${uLabel[item.urgency]}</span>
            <span class="tag-kpi">KPI: ${item.kpi}</span>
          </div>
        </div>
        <span class="nc-chevron">▾</span>
      </summary>
      <div class="ncb">
        <p class="ncb-desc">${item.desc}</p>
        <div class="ncb-fmt">
          <div class="ncb-fmt-label">💡 Formato &amp; Distribuição</div>
          <p>${item.formatDetail}</p>
        </div>
        <div class="ncb-foot">
          <a href="${item.fonteUrl}" target="_blank" class="nc-fonte">↗ ${item.fonte}</a>
          <div style="display:flex;align-items:center;gap:9px;flex-wrap:wrap;">
            <div class="fmt-select-wrap">
              <span class="fmt-select-label">Formato</span>
              <select class="fmt-select" id="fmtsel-${item.id}"
                      onchange="saveFmt('${item.id}',this.value)"
                      onclick="event.stopPropagation()">
                <option value="">— escolher —</option>
                ${['Carrossel','Vídeo YouTube','Reel','Stories','Newsletter'].map(f=>`<option value="${f}" ${getFmt(item.id)===f?'selected':''}>${f}</option>`).join('')}
              </select>
            </div>
            <button class="btn-mesa ${added?'added':''}"
                    id="bm-${item.id}"
                    onclick="${added?'void(0)':'addMesa(\''+item.id+'\')'}">
              ${added?'✓ Adicionado':'+ Adicionar à Mesa'}
            </button>
          </div>
        </div>
      </div>
    </details>
  `;
}

/* ════════════════════════════════════════════════
   RENDER MESA
════════════════════════════════════════════════ */
function buildMesa() {
  if (mesa.length === 0) {
    return `
      <div class="section" id="sec-mesa">
        <div class="mesa-hdr">
          <div>
            <h2>✍️ Mesa de Roteirização</h2>
            <div class="mesa-hdr-sub">Adicione pautas das categorias para roteirizar aqui.</div>
          </div>
        </div>
        <div class="mesa-empty">
          <div class="mesa-empty-icon">✍️</div>
          <p>A mesa está vazia.<br>Abra qualquer card e clique em <strong>+ Adicionar à Mesa</strong>.</p>
        </div>
      </div>
    `;
  }

  const cards = mesa.map(id => {
    const { item, m } = findItem(id);
    if (!item) return '';
    const note = getNote(id);
    const formatoSalvo = getFmt(id) || item.format;
    return `
      <div class="mcard" id="mc-${id}">
        <div class="mcard-hdr">
          <div class="mcard-hdr-left">
            <h4>${item.title}</h4>
            <div class="mcard-cat" style="color:${m.color}">${m.icon} ${m.label} &nbsp;·&nbsp;
              <select class="fmt-select" id="fmtsel-mesa-${id}" style="display:inline-block;min-width:140px;font-size:11px;padding:3px 7px;"
                      onchange="saveFmt('${id}',this.value);syncFmtSelect('${id}',this.value)">
                ${['Carrossel','Vídeo YouTube','Reel','Stories','Newsletter'].map(f=>`<option value="${f}" ${formatoSalvo===f?'selected':''}>${f}</option>`).join('')}
              </select>
              &nbsp;·&nbsp; KPI: ${item.kpi}
            </div>
          </div>
          <div class="mcard-hdr-actions">
            <button class="btn-prompt-claude" onclick="gerarPromptClaude('${id}')" title="Gerar e copiar prompt de roteirização personalizado">✨ Prompt à Claude</button>
            <button class="btn-remove" onclick="removeMesa('${id}')" title="Remover da mesa">✕</button>
          </div>
        </div>
        <div class="mcard-body">
          <label>Roteiro / Notas / Texto do Post</label>
          <textarea class="mesa-ta" id="ta-${id}"
            placeholder="Escreva aqui o roteiro, legenda, estrutura do carrossel, ou qualquer nota sobre esta pauta…"
            oninput="autoResize(this);debounceSave('${id}',this.value)"
          >${note}</textarea>
          <div class="save-dot" id="sd-${id}">✓ Salvo automaticamente</div>
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="section" id="sec-mesa">
      <div class="mesa-hdr">
        <div>
          <h2>✍️ Mesa de Roteirização</h2>
          <div class="mesa-hdr-sub">${mesa.length} pauta${mesa.length>1?'s':''} na mesa · Salvo automaticamente</div>
        </div>
        <div class="mesa-acts">
          <button class="btn-export" onclick="exportDocx()">⬇ Exportar .docx</button>
          <button class="btn-clear" onclick="clearMesa()">Limpar mesa</button>
        </div>
      </div>
      <div class="mesa-list">${cards}</div>
    </div>
  `;
}

/* ════════════════════════════════════════════════
   INIT + NAVIGATION
════════════════════════════════════════════════ */
function init() {
  buildTabs();
  const main = document.getElementById('main');
  let html = Object.keys(CAT).map(c => buildCatSection(c)).join('');
  html += buildMesa();
  main.innerHTML = html;

  // activate first
  const first = document.querySelector('.section');
  if (first) first.classList.add('active');

  // init textareas
  document.querySelectorAll('.mesa-ta').forEach(autoResize);
}

function showCat(cat, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  if (cat === 'mesa') {
    // re-render mesa (picks up latest state)
    const main = document.getElementById('main');
    const existing = document.getElementById('sec-mesa');
    if (existing) existing.remove();
    const div = document.createElement('div');
    div.innerHTML = buildMesa();
    main.appendChild(div.firstElementChild);
    document.getElementById('sec-mesa').classList.add('active');
    document.querySelectorAll('.mesa-ta').forEach(autoResize);
  } else {
    const sec = document.getElementById('sec-' + cat);
    if (sec) sec.classList.add('active');
  }
}

/* ════════════════════════════════════════════════
   MESA LOGIC
════════════════════════════════════════════════ */
function findItem(id) {
  for (const cat of Object.keys(NEWS)) {
    const item = NEWS[cat].find(i => i.id === id);
    if (item) return { item, m: CAT[cat] };
  }
  return { item: null, m: null };
}

function addMesa(id) {
  if (mesa.includes(id)) return;
  mesa.push(id);
  localStorage.setItem('pd_mesa', JSON.stringify(mesa));

  // Update button in place
  const btn = document.getElementById('bm-' + id);
  if (btn) {
    btn.textContent = '✓ Adicionado';
    btn.classList.add('added');
    btn.onclick = null;
  }

  // Update badge
  const tb = document.getElementById('tb-mesa');
  if (tb) tb.textContent = mesa.length;
}

function removeMesa(id) {
  mesa = mesa.filter(i => i !== id);
  localStorage.setItem('pd_mesa', JSON.stringify(mesa));

  const card = document.getElementById('mc-' + id);
  if (card) card.remove();

  const tb = document.getElementById('tb-mesa');
  if (tb) tb.textContent = mesa.length;

  const sub = document.querySelector('#sec-mesa .mesa-hdr-sub');
  if (sub) sub.textContent = mesa.length + ' pauta' + (mesa.length !== 1 ? 's' : '') + ' na mesa · Salvo automaticamente';

  if (mesa.length === 0) {
    const sec = document.getElementById('sec-mesa');
    if (sec) {
      sec.innerHTML = `
        <div class="mesa-hdr"><div>
          <h2>✍️ Mesa de Roteirização</h2>
          <div class="mesa-hdr-sub">Adicione pautas das categorias para roteirizar aqui.</div>
        </div></div>
        <div class="mesa-empty">
          <div class="mesa-empty-icon">✍️</div>
          <p>A mesa está vazia.<br>Abra qualquer card e clique em <strong>+ Adicionar à Mesa</strong>.</p>
        </div>`;
    }
  }
}

function clearMesa() {
  if (!confirm('Limpar toda a mesa? As notas salvas serão apagadas.')) return;
  mesa.forEach(id => localStorage.removeItem('pd_note_' + id));
  mesa = [];
  localStorage.setItem('pd_mesa', JSON.stringify([]));
  const tb = document.getElementById('tb-mesa');
  if (tb) tb.textContent = 0;
  const sec = document.getElementById('sec-mesa');
  if (sec) {
    sec.innerHTML = `
      <div class="mesa-hdr"><div>

      </div></div>

════════════════════════════════════════════════ */
function getFmt(id) { return localStorage.getItem('pd_fmt_' + id) || ''; }
function saveFmt(id, val) { localStorage.setItem('pd_fmt_' + id, val); }
function syncFmtSelect(id, val) {
  const sel = document.getElementById('fmtsel-' + id);
  if (sel) sel.value = val;
}

/* ════════════════════════════════════════════════
   PROMPT À CLAUDE — gerador de roteirização
════════════════════════════════════════════════ */
function gerarPromptClaude(id) {
  const { item, m } = findItem(id);
  if (!item) return;
  const formatoEscolhido = getFmt(id) || item.format || 'Carrossel';
  const personas = Array.isArray(item.personas) ? item.personas.join(' e ') : item.personas;

  let instrucaoFormato = '';
  if (formatoEscolhido.includes('Carrossel')) {
    instrucaoFormato = `Estrutura do carrossel:
- SLIDE 1 (Capa/Gancho): Tensão cognitiva imediata — afirmação ou pergunta que para o scroll. Fonte grande, fundo Off-White.
- SLIDES 2–5 (Progressão de Contexto): Cada slide adiciona UMA camada nova — nunca repete. Máximo 3 linhas por slide.
- SLIDE FINAL (Descoberta + CTA): Informação mais acionável + CTA de salvamento direcionado à persona.`;
  } else if (formatoEscolhido.includes('Newsletter')) {
    instrucaoFormato = `Tom e estrutura da newsletter:
- Escreva como carta íntima de bastidor — como se contasse para uma amiga próxima.
- Abertura: situação concreta que a leitora reconhece na própria vida.
- Corpo: desenvolvimento técnico mas nunca frio — use "você", "a gente", e o francês como tempero (voilà, bon, en résumé).
- Encerramento: uma ação clara que a leitora pode fazer ainda hoje.`;
  } else if (formatoEscolhido.includes('Reel') || formatoEscolhido.includes('Stories')) {
    instrucaoFormato = `Roteiro de vídeo curto (Reel/Stories):
- 0–3s (Gancho): Dado chocante ou afirmação contraintuitiva. Sem intro. Direto no fato.
- 4–18s (Contexto mínimo): Quem é afetado, por quê importa agora.
- 19–28s (Impacto real): O que muda concretamente na vida de quem assiste.
- 29–32s (CTA): Uma ação clara — "salva", "manda pra quem precisa", "comenta se isso te afeta".`;
  } else if (formatoEscolhido.includes('Vídeo YouTube')) {
    instrucaoFormato = `Roteiro YouTube:
- Abertura (0–45s): Gancho que justifica o vídeo — dado real, pergunta não-óbvia. Sem apresentação de canal.
- Desenvolvimento: Blocos com timestamps. Cada bloco responde UMA pergunta. Exemplos numéricos concretos.
- Encerramento: Síntese acionável em 3 pontos + CTA.`;
  }

  const descLimpa = item.desc ? item.desc.replace(/<[^>]+>/g, '') : '';
  const detalhe = item.formatDetail || '';

  const prompt = `# PROMPT DE ROTEIRIZAÇÃO — Por Dentro

## Pauta: ${item.title}
**Categoria:** ${m.label} | **Formato escolhido:** ${formatoEscolhido} | **KPI alvo:** ${item.kpi}
**Personas-alvo:** ${personas} | **Urgência:** ${item.urgency ? item.urgency.toUpperCase() : 'MÉDIA'}

---

## VOZ E TOM (obrigatório — não negociável)
Escreva como uma **conversa inteligente entre amigas** — direta, calorosa, lúcida, sem postura professoral.

Princípios absolutistas:
- **Sem romantizar** ("a França é linda", "é um sonho") e **sem assustar** ("é difícil demais", "você não vai conseguir")
- Frases curtas. Uma ideia por frase. Parágrafos de no máximo 3 linhas.
- O francês aparece como tempero natural, nunca como ostentação: *titre de séjour*, *bon*, *voilà*, *en résumé*
- Uso do "você" direto. Nunca "os imigrantes", nunca "as pessoas que..."
- Nenhum julgamento sobre escolhas pessoais. Nenhum alarmismo.

---

## CONTEXTO DA PAUTA
${descLimpa}

**Detalhe editorial original:**
${detalhe}

**Fonte:** ${item.fonte} — ${item.fonteUrl}

---

## ENTREGÁVEL ESPERADO
${instrucaoFormato}

---

## RESTRIÇÕES FINAIS
- Não use bullet points com traço — prefira ícones (→, ·) ou texto corrido
- Não comece com "Olá" ou "Oi gente"
- Não termine com "espero ter ajudado" ou fórmulas de fechamento padrão
- O conteúdo deve gerar IDENTIFICAÇÃO IMEDIATA + uma AÇÃO CLARA + uma DESCOBERTA ÚTIL

*Por Dentro · Canal YouTube e Instagram para brasileiras imigrantes na França*`;

  navigator.clipboard.writeText(prompt).then(() => {
    const btn = document.querySelector(`#mc-${id} .btn-prompt-claude`);
    if (btn) {
      const original = btn.textContent;
      btn.textContent = '✓ Copiado!';
      btn.style.background = '#063B35';
      btn.style.color = '#FAF8F4';
      setTimeout(() => {
        btn.textContent = original;
        btn.style.background = '';
        btn.style.color = '';
      }, 2500);
    }
  }).catch(() => {
    alert('Não foi possível acessar o clipboard. Verifique as permissões do navegador.');
  });
}

/* ════════════════════════════════════════════════
   TEXTAREA AUTO-RESIZE + AUTOSAVE
════════════════════════════════════════════════ */
function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

const _timers = {};
function debounceSave(id, val) {
  clearTimeout(_timers[id]);
  _timers[id] = setTimeout(() => {
    saveNote(id, val);
    const dot = document.getElementById('sd-' + id);
    if (dot) { dot.classList.add('show'); setTimeout(()=>dot.classList.remove('show'), 2200); }
  }, 600);
}

/* ════════════════════════════════════════════════
   DOCX EXPORT
════════════════════════════════════════════════ */
function exportDocx() {
  if (mesa.length === 0) { alert('A mesa está vazia.'); return; }

  // Try docx UMD library first
  if (window.docx && window.docx.Document) {
    exportWithLib();
  } else {
    exportWordBlob();
  }
}

async function exportWithLib() {
  const { Document, Packer, Paragraph, TextRun, HeadingLevel, BorderStyle, AlignmentType } = window.docx;

  const paras = [
    new Paragraph({
      children: [new TextRun({ text: 'Mesa de Roteirização — Por Dentro', bold: true, size: 40 })],
      alignment: AlignmentType.CENTER,
    }),
    new Paragraph({
      children: [new TextRun({ text: 'Digest Editorial · 26 mai – 8 jun 2026', italics: true, color: '7A6B60', size: 22 })],
      alignment: AlignmentType.CENTER,
    }),
    new Paragraph({ text: '' }),
    new Paragraph({ text: '' }),
  ];

  mesa.forEach((id, idx) => {
    const { item, m } = findItem(id);
    if (!item) return;
    const note = getNote(id);

    paras.push(
      new Paragraph({ children: [new TextRun({ text: `${idx+1}. ${item.title}`, bold: true, size: 28 })] }),
      new Paragraph({ children: [new TextRun({ text: `${m.icon} ${m.label}  ·  ${item.format}  ·  KPI: ${item.kpi}`, color: '7A6B60', size: 18 })] }),
      new Paragraph({ text: '' }),
      new Paragraph({ children: [new TextRun({ text: 'Contexto editorial:', bold: true })] }),
      new Paragraph({ text: item.desc.replace(/<[^>]+>/g,'') }),
      new Paragraph({ text: '' }),
      new Paragraph({ children: [new TextRun({ text: 'Orientação de formato:', bold: true })] }),
      new Paragraph({ text: item.formatDetail }),
      new Paragraph({ text: '' }),
      new Paragraph({ children: [new TextRun({ text: 'Roteiro / Notas:', bold: true })] }),
      new Paragraph({ text: note || '(sem notas registradas)' }),
      new Paragraph({ text: '' }),
      new Paragraph({ children: [new TextRun({ text: '──────────────────────────────────────────', color: 'CCCCCC' })] }),
      new Paragraph({ text: '' }),
    );
  });

  const doc = new Document({ sections: [{ children: paras }] });
  try {
    const blob = await Packer.toBlob(doc);
    dlBlob(blob, 'roteirizacao-por-dentro.docx', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document');
  } catch(e) {
    console.warn('docx lib error:', e);
    exportWordBlob();
  }
}

function exportWordBlob() {
  let body = `
    <h1 style="font-family:Georgia;font-size:20pt;color:#2A1F18;text-align:center">Mesa de Roteirização — Por Dentro</h1>
    <p style="font-family:Arial;font-size:10pt;color:#7A6B60;text-align:center;font-style:italic">Digest Editorial · 26 mai – 8 jun 2026</p>
    <br><br>
  `;
  mesa.forEach((id, idx) => {
    const { item, m } = findItem(id);
    if (!item) return;
    const note = getNote(id);
    const desc = item.desc.replace(/<[^>]+>/g,'');
    body += `
      <h2 style="font-family:Georgia;font-size:14pt;color:#2A1F18;margin-top:20pt">${idx+1}. ${item.title}</h2>
      <p style="font-family:Arial;font-size:9pt;color:#7A6B60">
        ${m.icon} ${m.label} &nbsp;·&nbsp; ${item.format} &nbsp;·&nbsp; KPI: ${item.kpi}
      </p>
      <p style="font-family:Arial;font-size:10pt"><b>Contexto editorial:</b></p>
      <p style="font-family:Arial;font-size:10pt">${desc}</p>
      <p style="font-family:Arial;font-size:10pt"><b>Orientação de formato:</b></p>
      <p style="font-family:Arial;font-size:10pt">${item.formatDetail}</p>
      <p style="font-family:Arial;font-size:10pt"><b>Roteiro / Notas:</b></p>
      <p style="font-family:Arial;font-size:10pt;white-space:pre-wrap">${note || '(sem notas registradas)'}</p>
      <hr style="border:none;border-top:1px solid #ccc;margin:16pt 0">
    `;
  });

  const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office"
    xmlns:w="urn:schemas-microsoft-com:office:word"
    xmlns="http://www.w3.org/TR/REC-html40">
    <head><meta charset="utf-8"><title>Mesa de Roteirização — Por Dentro</title>
    <style>body{font-family:Arial;}</style></head>
    <body>${body}</body></html>`;

  const blob = new Blob(['﻿', html], { type: 'application/msword' });
  dlBlob(blob, 'roteirizacao-por-dentro.doc', 'application/msword');
}

function dlBlob(blob, name, type) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 600);
}
