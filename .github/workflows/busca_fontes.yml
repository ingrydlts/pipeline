name: Por Dentro — Camada 1 (Busca de Fontes)

on:
  schedule:
    # Toda sexta-feira às 07h00 UTC (09h Paris no verão)
    - cron: '0 7 * * 5'
  workflow_dispatch:  # permite rodar manualmente pelo GitHub UI

jobs:
  busca:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar busca de fontes
        env:
          NOTION_TOKEN:       ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python scripts/busca_fontes.py
