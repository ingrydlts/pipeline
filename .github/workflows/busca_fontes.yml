name: Busca de Fontes - Por Dentro

on:
  schedule:
    # Roda automaticamente todos os dias às 06:00 AM UTC (Ajuste se necessário)
    - cron: '0 6 * * *'
  workflow_dispatch: # Permite que você clique no botão "Run workflow" manualmente pelo GitHub

jobs:
  buscar-noticias:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Código
      uses: actions/checkout@v3

    - name: Configurar Ambiente Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip' # Otimiza o tempo de execução nas próximas vezes

    - name: Instalar Dependências Necessárias
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Executar Buscador de Pautas Magnéticas
      env:
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        # Se o seu script de busca precisar de uma chave da NewsAPI, adicione-a nos Secrets do GitHub e declare abaixo:
        # NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      run: python scripts/busca_fontes.py
